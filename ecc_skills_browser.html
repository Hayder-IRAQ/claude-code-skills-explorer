<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Browse 136+ skills for Everything Claude Code — AI agents, backend, frontend, testing, and more.">
<meta name="theme-color" content="#0a0c10">
<title>ECC Skills Browser — Everything Claude Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Cairo:wght@400;600;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════
     Design Tokens
     ═══════════════════════════════════════════ */
  :root {
    --bg: #06080c;
    --surface: #0e1117;
    --surface2: #151921;
    --surface3: #1c212b;
    --border: #1e2530;
    --border-hover: #2a3140;
    --accent: #00d9ff;
    --accent-glow: rgba(0, 217, 255, 0.15);
    --accent2: #7c3aed;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --text: #e2e8f0;
    --text-secondary: #94a3b8;
    --muted: #64748b;
    --danger: #ef4444;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Cairo', 'Inter', sans-serif;
    --sans-en: 'Inter', 'Cairo', sans-serif;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
    --sidebar-w: 260px;
    --detail-w: 460px;
  }

  /* ═══════════════════════════════════════════
     Reset & Base
     ═══════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body[dir="ltr"] { font-family: var(--sans-en); }

  ::selection { background: var(--accent); color: var(--bg); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ═══════════════════════════════════════════
     Header
     ═══════════════════════════════════════════ */
  header {
    background: linear-gradient(180deg, rgba(14,17,23,0.97) 0%, rgba(6,8,12,0.97) 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
  }

  .logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border-radius: 10px;
    display: grid; place-items: center;
    font-size: 14px; font-weight: 800; color: #fff;
    font-family: var(--mono);
    box-shadow: 0 0 24px rgba(0,217,255,0.25);
    letter-spacing: -0.5px;
  }

  .logo-text h1 { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -0.3px; line-height: 1.2; }
  .logo-text span { font-size: 11px; color: var(--muted); font-family: var(--mono); }

  .search-box {
    flex: 1; max-width: 380px;
    position: relative;
    margin: 0 auto 0 16px;
  }
  [dir="ltr"] .search-box { margin: 0 16px 0 auto; }

  .search-box input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 14px 9px 38px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: var(--transition);
  }
  [dir="rtl"] .search-box input { padding: 9px 38px 9px 14px; }

  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .search-box input::placeholder { color: var(--muted); }

  .search-box svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  [dir="rtl"] .search-box svg { left: auto; right: 12px; }

  .header-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

  .stat-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    padding: 5px 12px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    white-space: nowrap;
  }
  .stat-chip strong { color: var(--accent); font-weight: 600; }

  .lang-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    padding: 5px 10px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: var(--mono);
    transition: var(--transition);
  }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ═══════════════════════════════════════════
     Layout
     ═══════════════════════════════════════════ */
  .app { display: flex; height: calc(100vh - 64px); }

  /* ═══════════════════════════════════════════
     Sidebar
     ═══════════════════════════════════════════ */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-inline-end: 1px solid var(--border);
    overflow-y: auto;
    padding: 14px 0;
    flex-shrink: 0;
  }

  .sidebar-label {
    font-size: 10px; font-family: var(--mono);
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 4px 18px 10px;
  }

  .cat-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 18px;
    cursor: pointer;
    border: none; background: transparent;
    color: var(--text-secondary);
    width: 100%; text-align: inherit;
    font-family: inherit; font-size: 13px;
    transition: var(--transition);
    border-inline-start: 3px solid transparent;
    position: relative;
  }

  .cat-btn:hover { background: var(--surface2); color: var(--text); }

  .cat-btn.active {
    background: var(--surface2);
    color: var(--accent);
    border-inline-start-color: var(--accent);
  }

  .cat-icon { font-size: 15px; flex-shrink: 0; line-height: 1; }

  .cat-count {
    margin-inline-start: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    min-width: 24px; text-align: center;
  }

  .cat-btn.active .cat-count {
    border-color: rgba(0,217,255,0.3);
    color: var(--accent);
    background: var(--accent-glow);
  }

  /* ═══════════════════════════════════════════
     Main Content
     ═══════════════════════════════════════════ */
  .main { flex: 1; overflow-y: auto; padding: 20px 24px; }

  .results-bar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
    font-size: 12px; color: var(--muted); font-family: var(--mono);
  }
  .results-bar strong { color: var(--accent); }

  .filter-chip {
    background: var(--accent-glow);
    border: 1px solid rgba(0,217,255,0.25);
    border-radius: var(--radius-xs);
    padding: 2px 10px;
    font-size: 11px; color: var(--accent);
    display: inline-flex; align-items: center; gap: 4px;
  }

  .sort-btn {
    margin-inline-start: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    padding: 4px 10px;
    font-size: 11px; font-family: var(--mono);
    color: var(--muted); cursor: pointer;
    transition: var(--transition);
  }
  .sort-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ═══════════════════════════════════════════
     Skills Grid
     ═══════════════════════════════════════════ */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  .skill-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    cursor: pointer;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }

  .skill-card::after {
    content: '';
    position: absolute;
    top: 0; inset-inline-start: 0;
    width: 50px; height: 2px;
    background: var(--card-accent, var(--accent));
    border-radius: 0 0 2px 0;
    transition: width var(--transition);
  }

  .skill-card:hover {
    border-color: var(--card-accent, var(--accent));
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
    background: var(--surface2);
  }
  .skill-card:hover::after { width: 100%; }

  .card-head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }

  .card-icon {
    width: 34px; height: 34px; border-radius: var(--radius-sm);
    background: var(--accent-glow);
    border: 1px solid rgba(0,217,255,0.15);
    display: grid; place-items: center;
    font-size: 15px; flex-shrink: 0;
  }

  .card-title { font-size: 14px; font-weight: 700; color: #fff; line-height: 1.35; }
  .card-id { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-top: 1px; }

  .card-desc {
    font-size: 12.5px; color: var(--text-secondary); line-height: 1.55;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-foot {
    display: flex; align-items: center; gap: 6px;
    margin-top: 10px;
  }

  .tag {
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    padding: 2px 7px;
    font-size: 10px; font-family: var(--mono);
    color: var(--muted);
    background: var(--surface2);
  }

  .tag-cat { border-color: var(--card-accent, var(--border)); color: var(--card-accent, var(--muted)); }

  .lines-label {
    margin-inline-start: auto;
    font-size: 10px; font-family: var(--mono);
    color: var(--border-hover);
  }

  /* ═══════════════════════════════════════════
     Detail Panel
     ═══════════════════════════════════════════ */
  .detail-panel {
    width: var(--detail-w);
    background: var(--surface);
    border-inline-start: 1px solid var(--border);
    display: none;
    flex-direction: column;
    flex-shrink: 0;
  }
  .detail-panel.open { display: flex; }

  .detail-head {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px;
  }

  .detail-icon {
    width: 48px; height: 48px; border-radius: var(--radius);
    background: var(--accent-glow);
    border: 1px solid rgba(0,217,255,0.15);
    display: grid; place-items: center;
    font-size: 22px; flex-shrink: 0;
  }

  .detail-title h2 { font-size: 17px; font-weight: 800; color: #fff; line-height: 1.3; }
  .detail-title code {
    font-family: var(--mono); font-size: 11px;
    color: var(--accent); background: var(--accent-glow);
    padding: 2px 8px; border-radius: 4px;
    display: inline-block; margin-top: 4px;
  }

  .close-detail {
    margin-inline-start: auto; margin-top: -2px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    padding: 6px 10px;
    cursor: pointer; font-size: 11px;
    font-family: inherit;
    transition: var(--transition);
  }
  .close-detail:hover { border-color: var(--danger); color: var(--danger); }

  .detail-body { flex: 1; overflow-y: auto; padding: 18px 22px; }

  .detail-section { margin-bottom: 18px; }

  .section-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted); font-family: var(--mono);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .detail-desc { font-size: 13.5px; color: var(--text); line-height: 1.7; }

  .when-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-inline-start: 3px solid var(--accent3);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 12.5px; color: var(--text); line-height: 1.65;
    white-space: pre-wrap;
  }

  .chips-row { display: flex; flex-wrap: wrap; gap: 5px; }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    padding: 4px 10px;
    font-size: 11px; font-family: var(--mono);
    color: var(--text-secondary);
  }

  .install-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 12px; color: var(--accent3);
    position: relative;
    direction: ltr; text-align: left;
    line-height: 1.8;
    overflow-x: auto;
  }

  .copy-btn {
    position: absolute; top: 8px; right: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    color: var(--muted);
    padding: 3px 9px;
    font-size: 10px; font-family: var(--mono);
    cursor: pointer;
    transition: var(--transition);
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  .meta-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .meta-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }

  .meta-label { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-bottom: 3px; }
  .meta-value { font-size: 14px; font-weight: 700; color: #fff; }

  /* ═══════════════════════════════════════════
     Empty State
     ═══════════════════════════════════════════ */
  .empty-state {
    text-align: center; padding: 80px 20px;
    color: var(--muted); grid-column: 1 / -1;
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; display: block; opacity: 0.5; }
  .empty-state p { font-size: 14px; }

  /* ═══════════════════════════════════════════
     Animations
     ═══════════════════════════════════════════ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .skill-card { animation: fadeUp 0.25s ease both; }

  /* ═══════════════════════════════════════════
     Responsive
     ═══════════════════════════════════════════ */
  @media (max-width: 1200px) {
    .detail-panel { --detail-w: 380px; }
  }

  @media (max-width: 960px) {
    .sidebar { display: none; }
    .detail-panel {
      position: fixed; inset: 64px 0 0;
      width: 100%; z-index: 90;
      --detail-w: 100%;
    }
    .stat-chip:not(:first-child) { display: none; }
  }

  @media (max-width: 640px) {
    header { padding: 0 14px; gap: 10px; }
    .logo-text h1 { font-size: 14px; }
    .logo-text span { display: none; }
    .main { padding: 14px; }
    .skills-grid { grid-template-columns: 1fr; }
    .stat-chip { display: none; }
  }
</style>
</head>
<body>

<!-- ═══════════ Header ═══════════ -->
<header>
  <div class="logo">
    <div class="logo-icon">ECC</div>
    <div class="logo-text">
      <h1>Skills Browser</h1>
      <span>Everything Claude Code</span>
    </div>
  </div>

  <div class="search-box">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="ابحث في المهارات..." oninput="filterSkills()">
  </div>

  <div class="header-actions">
    <div class="stat-chip"><strong id="totalCount">0</strong> <span data-i18n="skills">مهارة</span></div>
    <div class="stat-chip"><strong id="visibleCount">0</strong> <span data-i18n="visible">ظاهر</span></div>
    <button class="lang-btn" id="langToggle" onclick="toggleLang()" title="Switch language">EN / عر</button>
  </div>
</header>

<!-- ═══════════ App Layout ═══════════ -->
<div class="app">
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main" id="main">
    <div class="results-bar" id="resultsBar">
      <strong id="resultCount">0</strong> <span data-i18n="results">نتيجة</span>
      <span id="activeFilter"></span>
      <button class="sort-btn" id="sortBtn" onclick="toggleSort()">A→Z</button>
    </div>
    <div class="skills-grid" id="skillsGrid"></div>
  </main>

  <aside class="detail-panel" id="detailPanel">
    <div class="detail-head" id="detailHead"></div>
    <div class="detail-body" id="detailBody"></div>
  </aside>
</div>

/* ═══════════════════════════════════════════
   State
   ═══════════════════════════════════════════ */
let lang = 'ar';
let currentCat = 'all';
let searchTerm = '';
let sortAZ = false;

const $ = (id) => document.getElementById(id);

function t(key) { return I18N[lang][key] || key; }
function catLabel(cat) { return CATEGORIES[cat]?.[lang] || cat; }
function catColor(cat) { return CATEGORIES[cat]?.color || '#64748b'; }
function catIcon(cat)  { return CATEGORIES[cat]?.icon || '📦'; }

/* ═══════════════════════════════════════════
   Language Toggle
   ═══════════════════════════════════════════ */
function toggleLang() {
  lang = lang === 'ar' ? 'en' : 'ar';
  const dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;
  document.documentElement.dir = dir;
  document.body.dir = dir;
  $('searchInput').placeholder = t('search');
  $('searchInput').dir = dir;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  renderSidebar();
  renderSkills();
  // Re-render detail if open
  const panel = $('detailPanel');
  if (panel.classList.contains('open')) {
    const codeEl = panel.querySelector('.install-box');
    if (codeEl) {
      const id = codeEl.dataset.skillId;
      if (id) openDetail(id);
    }
  }
}

/* ═══════════════════════════════════════════
   Sidebar
   ═══════════════════════════════════════════ */
function renderSidebar() {
  const counts = {};
  SKILLS.forEach(s => { counts[s.cat] = (counts[s.cat] || 0) + 1; });

  let html = `<div class="sidebar-label">${t('categories')}</div>`;

  for (const [key, cat] of Object.entries(CATEGORIES)) {
    const count = key === 'all' ? SKILLS.length : (counts[key] || 0);
    if (key !== 'all' && count === 0) continue;
    const active = currentCat === key ? 'active' : '';
    html += `<button class="cat-btn ${active}" onclick="selectCat('${key}')">
      <span class="cat-icon">${cat.icon}</span>
      ${catLabel(key)}
      <span class="cat-count">${count}</span>
    </button>`;
  }

  $('sidebar').innerHTML = html;
}

function selectCat(cat) {
  currentCat = cat;
  renderSidebar();
  renderSkills();
  closeDetail();
}

/* ═══════════════════════════════════════════
   Filter & Sort
   ═══════════════════════════════════════════ */
function filterSkills() {
  searchTerm = $('searchInput').value.toLowerCase();
  renderSkills();
}

function toggleSort() {
  sortAZ = !sortAZ;
  $('sortBtn').textContent = sortAZ ? 'Z→A' : 'A→Z';
  renderSkills();
}

function getFiltered() {
  let list = SKILLS;
  if (currentCat !== 'all') list = list.filter(s => s.cat === currentCat);
  if (searchTerm) {
    list = list.filter(s =>
      s.title.toLowerCase().includes(searchTerm) ||
      s.id.toLowerCase().includes(searchTerm) ||
      s.desc.toLowerCase().includes(searchTerm)
    );
  }
  if (sortAZ) list = [...list].sort((a, b) => a.title.localeCompare(b.title));
  return list;
}

/* ═══════════════════════════════════════════
   Render Skills Grid
   ═══════════════════════════════════════════ */
function renderSkills() {
  const filtered = getFiltered();
  $('totalCount').textContent = SKILLS.length;
  $('visibleCount').textContent = filtered.length;
  $('resultCount').textContent = filtered.length;

  $('activeFilter').innerHTML = currentCat !== 'all'
    ? `<span class="filter-chip">${catIcon(currentCat)} ${catLabel(currentCat)}</span>`
    : '';

  if (!filtered.length) {
    $('skillsGrid').innerHTML = `<div class="empty-state">
      <span class="icon">🔍</span>
      <p>${t('noResults')} "${searchTerm}"</p>
    </div>`;
    return;
  }

  $('skillsGrid').innerHTML = filtered.map((s, i) => {
    const color = catColor(s.cat);
    return `<div class="skill-card" style="--card-accent:${color};animation-delay:${i * 0.015}s" onclick="openDetail('${s.id}')">
      <div class="card-head">
        <div class="card-icon" style="color:${color};background:${color}12;border-color:${color}25">${catIcon(s.cat)}</div>
        <div>
          <div class="card-title">${s.title}</div>
          <div class="card-id">${s.id}</div>
        </div>
      </div>
      <div class="card-desc">${s.desc || `<em style="opacity:.4">${t('noDesc')}</em>`}</div>
      <div class="card-foot">
        <span class="tag tag-cat" style="border-color:${color}30;color:${color}">${catLabel(s.cat)}</span>
        <span class="lines-label">${s.lines} ${t('line')}</span>
      </div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════
   Detail Panel
   ═══════════════════════════════════════════ */
function openDetail(id) {
  const s = SKILLS.find(sk => sk.id === id);
  if (!s) return;
  const color = catColor(s.cat);

  $('detailHead').innerHTML = `
    <div class="detail-icon" style="color:${color};background:${color}12;border-color:${color}25">${catIcon(s.cat)}</div>
    <div class="detail-title">
      <h2>${s.title}</h2>
      <code>${s.id}</code>
    </div>
    <button class="close-detail" onclick="closeDetail()">${t('close')}</button>`;

  let html = `<div class="detail-section">
    <div class="section-label">${t('description')}</div>
    <div class="detail-desc">${s.desc || `<em style="opacity:.5">${t('noDesc')}</em>`}</div>
  </div>`;

  if (s.when) {
    html += `<div class="detail-section">
      <div class="section-label">${t('whenToUse')}</div>
      <div class="when-box">${s.when}</div>
    </div>`;
  }

  if (s.sections?.length) {
    html += `<div class="detail-section">
      <div class="section-label">${t('sections')}</div>
      <div class="chips-row">${s.sections.map(sec => `<span class="chip">${sec}</span>`).join('')}</div>
    </div>`;
  }

  html += `<div class="detail-section">
    <div class="section-label">${t('fileInfo')}</div>
    <div class="meta-grid">
      <div class="meta-card"><div class="meta-label">${t('lines')}</div><div class="meta-value">${s.lines}</div></div>
      <div class="meta-card"><div class="meta-label">${t('category')}</div><div class="meta-value" style="color:${color}">${catLabel(s.cat)}</div></div>
    </div>
  </div>`;

  html += `<div class="detail-section">
    <div class="section-label">${t('install')}</div>
    <div class="install-box" data-skill-id="${s.id}">
      <button class="copy-btn" onclick="copyCmd('${s.id}')">${t('copy')}</button>
<span style="color:var(--muted)"># Project-level:</span>
cp -r skills/${s.id} .agents/skills/

<span style="color:var(--muted)"># User-level (global):</span>
cp -r skills/${s.id} ~/.claude/skills/
    </div>
  </div>`;

  $('detailBody').innerHTML = html;
  $('detailPanel').classList.add('open');
}

function copyCmd(id) {
  navigator.clipboard.writeText(`cp -r skills/${id} .agents/skills/`).then(() => {
    const btn = document.querySelector('.copy-btn');
    if (btn) { btn.textContent = t('copied'); setTimeout(() => btn.textContent = t('copy'), 1500); }
  });
}

function closeDetail() { $('detailPanel').classList.remove('open'); }

/* ═══════════════════════════════════════════
   Keyboard Shortcuts
   ═══════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
  if (e.key === '/' && document.activeElement !== $('searchInput')) {
    e.preventDefault();
    $('searchInput').focus();
  }
});
